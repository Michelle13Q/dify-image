name: Sync Dify Images to GHCR

on:
  workflow_dispatch:  # 允许手动点击按钮触发
  schedule:
    - cron: '0 2 * * *' # (可选) 每天凌晨2点自动同步一次

jobs:
  sync-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 登录到 GitHub 容器仓库 (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 同步 Redis
      - name: Sync Redis
        run: |
          echo "正在拉取 redis:6-alpine..."
          docker pull redis:6-alpine
          docker tag redis:6-alpine ghcr.io/michelle13q/dify-image/redis:6-alpine
          echo "正在推送 redis 到你的仓库..."
          docker push ghcr.io/michelle13q/dify-image/redis:6-alpine

   
